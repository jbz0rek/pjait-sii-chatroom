apiVersion: apps/v1
kind: Deployment
metadata:
  name: chat-app
  namespace: app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: chat-app
  template:
    metadata:
      labels:
        app: chat-app
    spec:
      containers:
        - name: chat
          image: youraccount/chatroom:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          env:
            # nazwa poda (dla logów itp.)
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            # publikacja do wszystkich podów: unikalny group-id = nazwa poda
            - name: CHAT_KAFKA_GROUP_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            # te same JVM / config opts co w Dockerfile (opcjonalnie nadpisywalne w K8s)
            - name: JAVA_OPTS
              value: "-XX:+UseContainerSupport -XX:MaxRAMPercentage=75.0 -Dspring.config.additional-location=optional:file:/config/"
          volumeMounts:
            - name: config
              mountPath: /config
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 20
            periodSeconds: 5
            timeoutSeconds: 2
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 40
            periodSeconds: 10
            timeoutSeconds: 2
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: config
          configMap:
            name: chat-config