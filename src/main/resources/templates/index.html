<!DOCTYPE html>
<html lang="pl" xmlns:th="https://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Room</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <!-- stomp / sockjs -->
    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>
</head>
<body class="flex flex-col h-screen bg-gray-100">

<!-- górny pasek -->
<header class="flex items-center justify-between bg-blue-600 p-4 text-white shadow-md">
    <div class="flex items-center">
        <img th:src="@{/images/image.png}" alt="logo" class="mr-3 h-10">
        <h1 class="text-xl font-bold">Chat Room</h1>
    </div>

    <div class="flex items-center space-x-4">
        <div class="flex items-center space-x-2">
            <span class="text-sm text-blue-100">Zalogowano jako:</span>
            <span th:text="${loggedUserName}" class="font-semibold"></span>

            <div
                    class="flex h-8 w-8 items-center justify-center rounded-full bg-green-400 font-bold text-white"
                    th:text="${#strings.substring(loggedUserName,0,1)}"
            ></div>
        </div>

        <form th:action="@{/logout}" method="post">
            <button
                    type="submit"
                    class="rounded-full bg-red-500 px-4 py-2 font-semibold text-white shadow transition duration-150 hover:bg-red-600"
            >
                Wyloguj
            </button>
        </form>
    </div>
</header>

<!-- pole odczytu wiadomości -->
<main id="messages" class="flex-1 space-y-4 overflow-y-auto bg-gray-200 p-4">
    <div
            th:each="msg : ${messages}"
            class="flex items-end"
            th:classappend="${msg.mine} ? 'justify-end' : 'justify-start'"
    >
        <!-- avatar dla innych -->
        <div th:if="${!msg.mine}" class="mr-2 flex-shrink-0">
            <div class="flex h-8 w-8 items-center justify-center rounded-full bg-blue-400 font-bold text-white">
                <span th:text="${#strings.substring(msg.author,0,1)}"></span>
            </div>
        </div>

        <!-- bąbelek wiadomości -->
        <div
                class="max-w-xs px-4 py-2 shadow"
                th:classappend="${msg.mine}
                    ? 'bg-blue-500 text-white rounded-l-xl rounded-tr-xl'
                    : 'bg-white text-gray-800 rounded-r-xl rounded-tl-xl'"
        >
            <p th:text="${msg.content}" class="break-words"></p>
            <small
                    th:text="${msg.author}"
                    class="mt-1 block text-xs"
                    th:classappend="${msg.mine} ? 'text-blue-100' : 'text-gray-500'"
            ></small>
        </div>

        <!-- avatar dla swoich -->
        <div th:if="${msg.mine}" class="ml-2 flex-shrink-0">
            <div class="flex h-8 w-8 items-center justify-center rounded-full bg-green-400 font-bold text-white">
                <span th:text="${#strings.substring(msg.author,0,1)}"></span>
            </div>
        </div>
    </div>
</main>

<!-- pole wpisywania -->
<footer class="flex items-center space-x-2 border-t border-gray-300 bg-white p-4">
    <form id="chatForm" class="flex w-full space-x-2">
        <input type="hidden" id="authorInput" th:value="${loggedUserName}">

        <input
                id="messageInput"
                type="text"
                name="message"
                placeholder="Napisz wiadomość..."
                class="flex-1 rounded-full border border-gray-300 p-2 focus:outline-none focus:ring-2 focus:ring-blue-400"
                autocomplete="off"
                required
        >

        <button
                type="submit"
                class="rounded-full bg-blue-500 px-4 py-2 font-semibold text-white hover:bg-blue-600"
        >
            Wyślij
        </button>
    </form>
</footer>

<!-- skrypt stomp -->
<script>
    let stompClient = null;

    document.addEventListener('DOMContentLoaded', () => {
        connectStomp();

        const form = document.getElementById('chatForm');
        const input = document.getElementById('messageInput');
        const authorInput = document.getElementById('authorInput');

        form.addEventListener('submit', (e) => {
            e.preventDefault();

            const content = input.value.trim();
            const author = (authorInput?.value || 'Ja').trim();

            if (!content) return;

            if (stompClient && stompClient.connected) {
                stompClient.send('/app/chat', {}, JSON.stringify({ author, content }));
            }

            input.value = '';
            input.focus();
        });
    });

    function connectStomp() {
        const socket = new SockJS('/ws');
        stompClient = Stomp.over(socket);

        stompClient.connect({}, () => {
            stompClient.subscribe('/topic/greetings', (message) => {
                try {
                    const payload = JSON.parse(message.body);
                    appendMessage(payload);
                } catch (e) {
                    console.error('Błąd parsowania wiadomości', e);
                }
            });
        });
    }

    function appendMessage(msg) {
        const messages = document.getElementById('messages');
        const loggedUser = document.getElementById('authorInput')?.value || 'Ja';
        const mine = equalsIgnoreCase(msg.author, loggedUser);

        const wrapper = document.createElement('div');
        wrapper.className = `flex items-end ${mine ? 'justify-end' : 'justify-start'}`;

        if (!mine) {
            const leftAvatar = document.createElement('div');
            leftAvatar.className = 'flex-shrink-0 mr-2';
            leftAvatar.innerHTML = `
                    <div class="w-8 h-8 rounded-full bg-blue-400 flex items-center justify-center text-white font-bold">
                        ${escapeHtml((msg.author || 'A').charAt(0).toUpperCase())}
                    </div>
                `;
            wrapper.appendChild(leftAvatar);
        }

        const bubble = document.createElement('div');
        bubble.className = `
                ${mine
            ? 'bg-blue-500 text-white rounded-l-xl rounded-tr-xl'
            : 'bg-white text-gray-800 rounded-r-xl rounded-tl-xl'}
                max-w-xs px-4 py-2 shadow
            `;

        bubble.innerHTML = `
                <p class="break-words">${escapeHtml(msg.content || '')}</p>
                <small class="block mt-1 text-xs ${mine ? 'text-blue-100' : 'text-gray-500'}">
                    ${escapeHtml(msg.author || 'Anon')}
                </small>
            `;

        wrapper.appendChild(bubble);

        if (mine) {
            const rightAvatar = document.createElement('div');
            rightAvatar.className = 'flex-shrink-0 ml-2';
            rightAvatar.innerHTML = `
                    <div class="w-8 h-8 rounded-full bg-green-400 flex items-center justify-center text-white font-bold">
                        ${escapeHtml((msg.author || 'J').charAt(0).toUpperCase())}
                    </div>
                `;
            wrapper.appendChild(rightAvatar);
        }

        const spacer = document.createElement('div');
        spacer.className = 'mb-4';
        spacer.appendChild(wrapper);

        messages.appendChild(spacer);
        messages.scrollTop = messages.scrollHeight;
    }

    function escapeHtml(text) {
        const map = {
            '&': '&amp;',
            '<': '&lt;',
            '>': '&gt;',
            '"': '&quot;',
            "'": '&#039;'
        };

        return String(text).replace(/[&<>"']/g, (m) => map[m]);
    }

    function equalsIgnoreCase(a, b) {
        return (a || '').toLowerCase() === (b || '').toLowerCase();
    }
</script>
</body>
</html>
